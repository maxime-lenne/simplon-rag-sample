# Base compose: development setup with hot reload and source bind mounts.
# Override for production with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: simplon_rag_postgres_pgvector
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rag}
      POSTGRES_USER: ${POSTGRES_USER:-rag_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag_password}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./api/data/db/init/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rag_user} -d ${POSTGRES_DB:-rag}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ./api
      target: dev
    container_name: simplon_rag_api
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./api/.env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-rag}
      POSTGRES_USER: ${POSTGRES_USER:-rag_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag_password}
      APP_ENV: development
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:4173,http://localhost:8501"
      # Ollama runs on the host; api container reaches it via host.docker.internal.
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
      - api_data_docs:/app/data/docs
      - api_data_eval:/app/data/evaluation
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: simplon_rag_frontend
    depends_on:
      api:
        condition: service_healthy
    environment:
      RAG_API_URL: "http://api:8000"
      RAG_API_TIMEOUT_SECONDS: "${RAG_API_TIMEOUT_SECONDS:-300}"
    ports:
      - "8501:8501"
    volumes:
      - ./frontend:/app
    restart: unless-stopped

volumes:
  pgdata:
  api_data_docs:
  api_data_eval:
