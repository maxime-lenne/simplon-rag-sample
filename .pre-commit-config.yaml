default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: local
    hooks:
      - id: pymarkdownlnt
        name: PyMarkdown Lint
        entry: pymarkdownlnt scan
        language: system
        types: [markdown]

      - id: yamllint
        name: YAML Lint
        entry: yamllint
        language: system
        types: [yaml]

      - id: frontend-lint
        name: frontend lint (prettier + eslint)
        language: system
        entry: bash -c 'cd frontend && bun run lint'
        files: ^frontend/.*\.(ts|js|svelte|css|json)$
        pass_filenames: false
